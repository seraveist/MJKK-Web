{% extends 'base.html' %}
{% block custom_css %}
<style>
  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .s-card { background: var(--bg-table-header); border-radius: 10px; padding: 14px; text-align: center; }
  .s-card .label { font-size: 11px; color: var(--text-tertiary); margin-bottom: 4px; }
  .s-card .value { font-size: 22px; font-weight: 700; color: var(--text-heading); }
  .s-card .sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
  .award-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .award-card { background: var(--bg-table-header); border-radius: 10px; padding: 12px; text-align: center; border: 1px solid var(--border-light); }
  .award-card .a-title { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }
  .award-card .a-winner { font-size: 15px; font-weight: 700; color: var(--text-heading); margin: 4px 0; }
  .award-card .a-value { font-size: 13px; color: var(--color-accent); font-weight: 600; }
  .timeline { max-height: 200px; overflow-y: auto; }
  .tl-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
  .tl-date { color: var(--text-tertiary); min-width: 80px; font-size: 12px; }
  .tl-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .tl-yakuman { background: #fef3c7; color: #92400e; }
  .tl-sanbaiman { background: #dbeafe; color: #1d4ed8; }
  [data-theme="dark"] .tl-yakuman { background: #451a03; color: #fcd34d; }
  [data-theme="dark"] .tl-sanbaiman { background: #1e3a5f; color: #93c5fd; }
  .meta-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .meta-item { font-size: 13px; color: var(--text-secondary); }
  .meta-item strong { color: var(--text-heading); }
  .yaku-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .yaku-chip { padding: 4px 10px; background: var(--bg-table-header); border-radius: 14px; font-size: 12px; color: var(--text-secondary); }
  .yaku-chip .cnt { font-weight: 600; color: var(--text-heading); margin-left: 4px; }
  .section-toggle { font-size: 12px; color: var(--color-accent); cursor: pointer; float: right; font-weight: 500; }
</style>
{% endblock %}

{% block content %}
<div id="loading" class="loading-overlay" style="display: none;"><div class="spinner"></div></div>

<div class="stats-container">
  <h1>대시보드</h1>

  <div class="season-tabs">
    {% for s in available_seasons %}
    <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">시즌 {{ s }}</button>
    {% endfor %}
    <button class="tab {% if season == 'all' %}active{% endif %}" data-season="all">전체</button>
  </div>

  <div class="separator"></div>

  <!-- 요약 카드 -->
  <div class="summary-cards" id="summaryCards"></div>

  <!-- 메타 분석 -->
  <div id="metaSection" style="display:none;">
    <h2>리그 메타 <span class="section-toggle" onclick="toggleSection('metaDetail')">상세</span></h2>
    <div class="meta-row" id="metaRow"></div>
    <div id="metaDetail" style="display:none;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:6px;">가장 많이 나온 역 TOP 10</div>
      <div class="yaku-list" id="topYakus"></div>
    </div>
    <div class="separator"></div>
  </div>

  <!-- 시즌 어워드 -->
  <div id="awardsSection" style="display:none;">
    <h2>시즌 어워드</h2>
    <div class="award-grid" id="awardGrid"></div>
    <div class="separator"></div>
  </div>

  <!-- 역만/삼배만 타임라인 -->
  <div id="yakumanSection" style="display:none;">
    <h2>역만 / 삼배만 기록</h2>
    <div class="timeline" id="yakumanTimeline"></div>
    <div class="separator"></div>
  </div>

  <!-- 랭킹 테이블 -->
  <div id="rankingInfo" style="text-align:right; margin-bottom:8px; font-size:13px; color:var(--text-tertiary);"></div>
  <div id="rankingSection">
    <table id="rankingTable">
      <thead><tr><th>유저명</th><th>대국 수</th><th>우마 합산</th><th>우마 평균</th></tr></thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>

  <div class="separator"></div>

  <h2>날짜별 점수 기록</h2>
  <div class="table-scroll-wrapper" style="max-height:400px;">
    <table id="dateScoreTable">
      <thead id="dateScoreHeader"><tr><th>날짜</th></tr></thead>
      <tbody id="dateScoreBody"></tbody>
    </table>
  </div>
</div>

<script>
  window.config = { season: "{{ season }}" };
  function toggleSection(id) {
    var el = document.getElementById(id);
    el.style.display = el.style.display === 'none' ? '' : 'none';
  }
</script>
<script src="{{ url_for('static', filename='js/ranking.js') }}"></script>
{% endblock %}
