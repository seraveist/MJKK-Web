{% extends "base.html" %}
{% block custom_css %}
<style>
  .report-section { margin-bottom: 24px; }
  .report-award-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  @media (max-width: 800px) { .report-award-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 500px) { .report-award-grid { grid-template-columns: repeat(2, 1fr); } }
  .report-award { background: var(--bg-table-header); border-radius: 8px; padding: 10px; text-align: center; border: 1px solid var(--border-light); }
  .report-award .ra-title { font-size: 11px; color: var(--text-tertiary); }
  .report-award .ra-winner { font-size: 14px; font-weight: 700; color: var(--text-heading); margin: 2px 0; }
  .report-award .ra-value { font-size: 12px; color: var(--color-accent); font-weight: 600; }
  .elo-bar { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .elo-bar .eb-name { min-width: 80px; font-size: 13px; font-weight: 500; }
  .elo-bar .eb-fill { height: 18px; border-radius: 4px; background: var(--color-accent); min-width: 4px; transition: width 0.5s; }
  .elo-bar .eb-val { font-size: 12px; font-weight: 600; color: var(--text-heading); }
  .hl-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
  .hl-date { color: var(--text-tertiary); min-width: 80px; font-size: 12px; }
  .hl-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .hl-yakuman { background: #fef3c7; color: #92400e; }
  .hl-sanbaiman { background: #dbeafe; color: #1d4ed8; }
  .hl-double-yakuman { background: #fee2e2; color: #991b1b; }
  [data-theme="dark"] .hl-yakuman { background: #451a03; color: #fcd34d; }
  [data-theme="dark"] .hl-sanbaiman { background: #1e3a5f; color: #93c5fd; }
  [data-theme="dark"] .hl-double-yakuman { background: #450a0a; color: #fca5a5; }
</style>
{% endblock %}
{% block content %}
<div id="loading" class="loading-overlay" style="display:none;"><div class="spinner"></div></div>
<div class="stats-container">
  <div style="margin-bottom:12px;"><a href="/" style="font-size:13px;color:var(--text-link);text-decoration:none;">← 대시보드로 돌아가기</a></div>
  <h1 id="reportTitle">시즌 리포트</h1>
  <div class="season-tabs">
    {% for s in available_seasons %}
      <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">시즌 {{ s }}</button>
    {% endfor %}
  </div>
  <div class="separator"></div>

  <div id="reportContent"></div>
  <p id="reportEmpty" class="empty-state" style="display:none;">리포트 데이터가 없습니다.</p>
</div>
<script>window.config = { season: "{{ season }}" };</script>
<script src="{{ url_for('static', filename='js/report.js') }}"></script>
{% endblock %}
