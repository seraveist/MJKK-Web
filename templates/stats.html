{% extends "base.html" %}
{% block custom_css %}
<style>
  .nav-btns { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .nav-btns a { padding: 6px 14px; border: 1px solid var(--border-tab); border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; color: var(--text-link); transition: all 0.2s; }
  .nav-btns a:hover { border-color: var(--color-accent); background: var(--bg-card-hover); }
  .streak-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .streak-card { background: var(--bg-table-header); border-radius: 8px; padding: 10px; text-align: center; }
  .streak-card .sk-label { font-size: 11px; color: var(--text-tertiary); }
  .streak-card .sk-value { font-size: 20px; font-weight: 700; color: var(--text-heading); }
  .streak-card .sk-sub { font-size: 11px; color: var(--text-tertiary); }
</style>
{% endblock %}
{% block content %}
<div id="loading" class="loading-overlay" style="display: none;"><div class="spinner"></div></div>

<div class="stats-container">
  <h1>개인 통계</h1>

  <div class="season-tabs" id="seasonTabArea">
    {% for s in available_seasons %}
      <button class="tab season-btn {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">시즌 {{ s }}</button>
    {% endfor %}
    <button class="tab season-btn" id="btnAllSeason" data-season="all">전체</button>
  </div>
  <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px;margin-bottom:12px;">복수 시즌 선택: 클릭으로 토글</div>

  <div class="separator"></div>

  <div style="display:flex;gap:12px;align-items:end;flex-wrap:wrap;margin-bottom:16px;">
    <div class="form-group" style="flex:1;min-width:160px;margin-bottom:0;">
      <label for="playerSelect">플레이어</label>
      <select id="playerSelect" class="form-input"></select>
    </div>
  </div>

  <!-- [신규] 바로가기 버튼 -->
  <div class="nav-btns" id="navBtns" style="display:none;">
    <a id="linkCompare" href="/compare">이 플레이어와 비교하기</a>
    <a id="linkMatchup" href="/matchup">상성 보기</a>
    <a id="linkSeasonCmp" href="/trend">시즌 비교</a>
  </div>

  <div class="separator"></div>

  <!-- [신규] 연승/연패 -->
  <div id="streakSection" style="display:none;">
    <h2>연속 기록</h2>
    <div class="streak-cards" id="streakCards"></div>
    <div class="separator"></div>
  </div>

  <!-- 카테고리 탭 -->
  <div class="category-tabs" id="categoryTabs"></div>

  <!-- 통계 테이블 -->
  <table id="statsTable">
    <thead><tr><th>항목</th><th>값</th></tr></thead>
    <tbody></tbody>
  </table>

  <div class="separator"></div>

  <h2>순위 차트 (최근 <select id="countSelect" style="padding:2px 6px;font-size:13px;border:1px solid var(--border-input);border-radius:4px;font-family:inherit;background:var(--bg-input);color:var(--text-primary);">
    <option value="10">10</option><option value="20">20</option><option value="50">50</option><option value="100">100</option>
  </select> 국)</h2>
  <div class="graph-container"><canvas id="rankChart"></canvas></div>

  <div class="separator"></div>

  <!-- [신규] 플레이 스타일 프로파일 -->
  <div id="profileSection" style="display:none;">
    <h2>플레이 스타일 <span id="profileStyle" style="font-size:14px;color:var(--color-accent);margin-left:8px;"></span></h2>
    <div class="graph-container" style="height:280px;"><canvas id="radarChart"></canvas></div>
    <div class="separator"></div>
  </div>

  <h2>역 달성</h2>
  <table id="yakuTable">
    <thead><tr><th>역</th><th>횟수</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
  window.config = {
    season: "{{ season }}",
    playerName: "{{ player_name|default('', true) }}",
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/statsConfig.js') }}"></script>
<script src="{{ url_for('static', filename='js/stats.js') }}"></script>
{% endblock %}
