{% extends "base.html" %}
{% block content %}

<div id="loading" class="loading-overlay" style="display: none;">
  <div class="spinner"></div>
</div>

<div class="stats-container">
  <h1>개인 통계</h1>

  <div class="season-tabs">
    {% for s in available_seasons %}
      <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">
        시즌 {{ s }}
      </button>
    {% endfor %}
    <button class="tab {% if season == 'all' %}active{% endif %}" data-season="all">전체</button>
  </div>

  <div class="separator"></div>

  <div class="form-group">
    <label for="playerSelect">플레이어</label>
    <select id="playerSelect" class="form-input" style="max-width:240px;"></select>
  </div>

  <div class="separator"></div>

  <h2>최근 순위</h2>
  <div class="graph-container">
    <canvas id="rankChart"></canvas>
  </div>
  <div class="graph-controls">
    <button class="graph-btn" data-count="10">10국</button>
    <button class="graph-btn" data-count="50">50국</button>
    <button class="graph-btn" data-count="100">100국</button>
  </div>

  <div class="separator"></div>

  <h2>시즌 통계</h2>
  <!-- 카테고리 탭 -->
  <div class="category-tabs" id="categoryTabs"></div>
  <table id="statsTable">
    <thead>
      <tr><th>항목</th><th>값</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="separator"></div>

  <h2>역 달성 내역</h2>
  <table id="yakuTable">
    <thead>
      <tr><th>역 종류</th><th>달성 횟수</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
  window.config = {
    season: "{{ season }}",
    playerName: "{{ player_name|default('') }}"
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/statsConfig.js') }}"></script>
<script src="{{ url_for('static', filename='js/stats.js') }}"></script>
{% endblock %}
