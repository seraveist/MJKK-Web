{% extends "base.html" %}
{% block custom_css %}
<style>
  .pg-btn { padding: 5px 12px; border: 1px solid var(--border-tab); background: var(--bg-tab); border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; color: var(--text-secondary); margin: 0 2px; }
  .pg-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  .pg-active { background: var(--color-accent) !important; color: #fff !important; border-color: var(--color-accent) !important; }
  .big-hand-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-left: 4px; vertical-align: middle; }
  .badge-yakuman { background: #fef3c7; color: #92400e; }
  .badge-sanbaiman { background: #dbeafe; color: #1d4ed8; }
  .badge-baiman { background: #dcfce7; color: #166534; }
  [data-theme="dark"] .badge-yakuman { background: #451a03; color: #fcd34d; }
  [data-theme="dark"] .badge-sanbaiman { background: #1e3a5f; color: #93c5fd; }
  [data-theme="dark"] .badge-baiman { background: #14532d; color: #86efac; }
</style>
{% endblock %}
{% block content %}
<div id="loading" class="loading-overlay" style="display: none;"><div class="spinner"></div></div>

<div class="stats-container">
  <h1>대국 기록</h1>
  <div class="season-tabs">
    {% for s in available_seasons %}
      <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">시즌 {{ s }}</button>
    {% endfor %}
    <button class="tab {% if season == 'all' %}active{% endif %}" data-season="all">전체</button>
  </div>
  <div class="separator"></div>
  <div id="logInfo" style="text-align:right;font-size:13px;color:var(--text-tertiary);margin-bottom:8px;"></div>
  <div class="table-scroll-wrapper" style="max-height:70vh;">
    <table id="logTable">
      <thead><tr><th>날짜</th><th>1위</th><th>2위</th><th>3위</th><th>4위</th><th>상세 / 패보</th></tr></thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
  <div id="pagination" style="display:flex;justify-content:center;gap:4px;margin-top:12px;"></div>
</div>

<script>window.config = { season: "{{ season }}" };</script>
<script src="{{ url_for('static', filename='js/gameLogViewer.js') }}"></script>
{% endblock %}
