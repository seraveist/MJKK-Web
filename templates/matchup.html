{% extends "base.html" %}
{% block content %}
<div id="loading" class="loading-overlay" style="display: none;">
  <div class="spinner"></div>
</div>

<div class="stats-container">
  <h1>상성 분석</h1>

  <div class="season-tabs">
    {% for s in available_seasons %}
      <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">시즌 {{ s }}</button>
    {% endfor %}
    <button class="tab {% if season == 'all' %}active{% endif %}" data-season="all">전체</button>
  </div>

  <div class="separator"></div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
    <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0;">
      <label for="matchP1">플레이어 1</label>
      <select id="matchP1" class="form-input"></select>
    </div>
    <div style="font-size:18px;font-weight:600;color:var(--text-muted);padding-bottom:8px;">VS</div>
    <div class="form-group" style="flex:1;min-width:140px;margin-bottom:0;">
      <label for="matchP2">플레이어 2</label>
      <select id="matchP2" class="form-input"></select>
    </div>
    <button class="btn-primary" onclick="loadMatchup()" style="margin-bottom:0;height:42px;">분석</button>
  </div>

  <div class="separator"></div>

  <div id="matchupResult" class="empty-state">플레이어 두 명을 선택하고 분석 버튼을 눌러주세요.</div>

  <!-- 상성 요약 -->
  <div id="matchupSummary" style="display:none;">
    <div id="summaryCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px;"></div>

    <div class="separator"></div>

    <h2>상세 통계</h2>
    <table id="matchupTable">
      <thead>
        <tr>
          <th>항목</th>
          <th id="mh1">-</th>
          <th id="mh2">-</th>
        </tr>
      </thead>
      <tbody id="matchupBody"></tbody>
    </table>

    <div class="separator"></div>

    <h2>대국 이력</h2>
    <div class="table-scroll-wrapper" style="max-height:400px;">
      <table id="matchupGames">
        <thead>
          <tr>
            <th>날짜</th>
            <th id="gh1">P1 순위</th>
            <th id="gh2">P2 순위</th>
            <th>P1 우마</th>
            <th>P2 우마</th>
          </tr>
        </thead>
        <tbody id="matchupGamesBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  window.config = { season: "{{ season }}" };
</script>
<script src="{{ url_for('static', filename='js/matchup.js') }}"></script>
{% endblock %}
