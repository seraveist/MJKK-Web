<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}마자까까 내전 집계{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16x16.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Segoe UI', sans-serif;
      background-color: #f0f2f5;
      color: #333;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 네비게이션 ── */
    nav {
      background: #1a1a2e;
      padding: 0;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    nav a {
      color: #b8b8cc;
      text-decoration: none;
      padding: 14px 20px;
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }
    nav a:hover, nav a.active {
      color: #fff;
      background: rgba(255,255,255,0.05);
      border-bottom-color: #5b8def;
    }

    /* ── 메인 컨테이너 ── */
    .stats-container {
      max-width: 960px;
      margin: 0 auto 30px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #1a1a2e;
    }
    h2 {
      font-size: 17px;
      font-weight: 600;
      margin: 24px 0 12px;
      color: #1a1a2e;
    }

    .separator {
      height: 1px;
      background: #e8e8e8;
      margin: 16px 0;
    }

    /* ── 시즌 탭 ── */
    .season-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .season-tabs .tab {
      padding: 6px 14px;
      border: 1px solid #ddd;
      background: #fafafa;
      cursor: pointer;
      border-radius: 20px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
      color: #555;
    }
    .season-tabs .tab:hover {
      border-color: #5b8def;
      color: #5b8def;
    }
    .season-tabs .tab.active {
      background: #5b8def;
      color: #fff;
      border-color: #5b8def;
    }

    /* ── 테이블 공통 ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: #f5f6f8;
      color: #555;
      font-weight: 600;
      padding: 10px 12px;
      text-align: center;
      border-bottom: 2px solid #e0e0e0;
      position: relative;
    }
    td {
      padding: 8px 12px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
      color: #444;
    }
    tr:hover td {
      background: #f8f9fc;
    }
    td:first-child, th:first-child {
      text-align: left;
      font-weight: 500;
      color: #333;
    }

    /* ── 스크롤 래퍼 ── */
    .table-scroll-wrapper {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
    }
    .table-scroll-wrapper table {
      min-width: max-content;
      margin: 0;
      border-collapse: separate;
      border-spacing: 0;
    }
    .table-scroll-wrapper th,
    .table-scroll-wrapper td {
      border-bottom: 1px solid #f0f0f0;
    }

    /* sticky 첫 번째 열 — 배경 불투명 + 그림자로 구분 */
    .table-scroll-wrapper th:first-child,
    .table-scroll-wrapper td:first-child {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #fff;
      box-shadow: 2px 0 4px rgba(0,0,0,0.04);
    }
    .table-scroll-wrapper thead th:first-child {
      background: #f5f6f8;
      z-index: 5;
      box-shadow: 2px 0 4px rgba(0,0,0,0.06);
    }
    /* sticky 열: 짝수행 + hover 배경 오버라이드 */
    .table-scroll-wrapper tr:nth-child(even) > td:first-child,
    .table-scroll-wrapper tr:nth-child(even) > th:first-child {
      background: #f9f9fb;
    }
    .table-scroll-wrapper tr:hover > td:first-child,
    .table-scroll-wrapper tr:hover > th:first-child {
      background: #f0f2f8;
    }

    /* sticky 헤더 행 */
    .table-scroll-wrapper thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #f5f6f8;
      border-bottom: 2px solid #e0e0e0;
    }

    /* ── 카테고리 탭 (개인통계용) ── */
    .category-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar {
      display: none;
    }
    .category-tabs .cat-tab {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .category-tabs .cat-tab:hover {
      color: #5b8def;
    }
    .category-tabs .cat-tab.active {
      color: #5b8def;
      border-bottom-color: #5b8def;
    }

    /* ── 카테고리 헤더 (테이블 내) ── */
    .category-header {
      background: #f0f4ff !important;
      font-weight: 600 !important;
      color: #3a6fd8 !important;
      font-size: 13px;
      text-align: left !important;
      padding: 8px 12px !important;
    }

    /* ── Min/Max 하이라이트 (전체통계용) ── */
    .val-best {
      color: #2563eb;
      font-weight: 600;
    }
    .val-worst {
      color: #dc2626;
      font-weight: 600;
    }

    /* ── 그래프 ── */
    .graph-container {
      height: 250px;
      margin-bottom: 8px;
    }
    .graph-controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .graph-btn {
      padding: 5px 14px;
      border: 1px solid #ddd;
      background: #fafafa;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .graph-btn:hover {
      border-color: #5b8def;
      color: #5b8def;
    }

    /* ── 랭킹 테이블 ── */
    #rankingTable a {
      color: #5b8def;
      text-decoration: none;
      font-weight: 500;
    }
    #rankingTable a:hover {
      text-decoration: underline;
    }

    /* ── 패보 재생 팝업 ── */
    .viewer-popup {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 10px;
      z-index: 1000;
      min-width: 140px;
      animation: popupFadeIn 0.15s ease;
    }
    @keyframes popupFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .viewer-popup-title {
      font-size: 11px;
      color: #888;
      font-weight: 500;
      margin-bottom: 6px;
      padding: 0 4px;
    }
    .viewer-popup-loading {
      font-size: 12px;
      color: #aaa;
      padding: 4px;
    }
    .viewer-popup-btn {
      display: block;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      color: #333;
      transition: background 0.15s;
    }
    .viewer-popup-btn:hover {
      background: #f0f4ff;
      color: #5b8def;
    }
    .viewer-popup-btn-sub {
      color: #666;
    }

    /* ── 폼 ── */
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #5b8def;
      box-shadow: 0 0 0 3px rgba(91,141,239,0.1);
    }
    .btn-primary {
      padding: 10px 24px;
      background: #5b8def;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover {
      background: #4a7be0;
    }

    /* ── 메시지 ── */
    .msg-success { color: #16a34a; font-weight: 600; }
    .msg-error   { color: #dc2626; font-weight: 600; }
    .msg-info    { color: #555; font-weight: 500; }

    /* ── 빈 상태 / 에러 상태 ── */
    .empty-state {
      text-align: center !important;
      color: #aaa !important;
      font-weight: 400 !important;
      padding: 32px 16px !important;
      font-size: 14px;
    }
    .error-state {
      text-align: center !important;
      color: #dc2626 !important;
      font-weight: 500 !important;
      padding: 32px 16px !important;
      font-size: 14px;
    }

    /* ── 로딩 ── */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #5b8def;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 반응형: PC ── */
    @media (min-width: 1200px) {
      body { padding: 32px; }
      .stats-container { max-width: 1100px; padding: 32px; }
      table { font-size: 14px; }
      nav a { padding: 14px 28px; font-size: 15px; }
    }

    /* ── 반응형: 모바일 ── */
    @media (max-width: 600px) {
      body { padding: 10px; }
      .stats-container { padding: 14px; border-radius: 8px; }
      h1 { font-size: 17px; }
      table { font-size: 12px; }
      td, th { padding: 6px 8px; }
      .graph-container { height: 180px; }
      .season-tabs .tab { padding: 5px 10px; font-size: 12px; }
      nav a { padding: 12px 14px; font-size: 13px; }
    }

    {% block custom_css %}{% endblock %}
  </style>
</head>
<body>
  <nav>
    <a href="/">대시보드</a>
    <a href="/stats">개인 통계</a>
    <a href="/totalstats">전체 통계</a>
    <a href="/compare">비교</a>
    <a href="/trend">추이</a>
    <a href="/games">대국 기록</a>
    <a href="/upload_log">패보 등록</a>
    <a href="/admin/users">관리</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
