{% extends "base.html" %}
{% block content %}
<div id="loading" class="loading-overlay" style="display: none;">
  <div class="spinner"></div>
</div>

<div class="stats-container">
  <h1>전체 유저 통계</h1>

  <div class="season-tabs">
    {% for s in available_seasons %}
      <button class="tab {% if s|string == season|string %}active{% endif %}" data-season="{{ s }}">
        시즌 {{ s }}
      </button>
    {% endfor %}
    <button class="tab {% if season == 'all' %}active{% endif %}" data-season="all">전체</button>
  </div>

  <div class="separator"></div>

  <p style="font-size:12px;color:#888;text-align:right;margin-bottom:8px;">
    <span class="val-best">최고</span> /
    <span class="val-worst">최저</span>
  </p>

  <div class="table-scroll-wrapper" style="max-height:70vh;">
    <table id="totalStatsTable">
      <thead>
        <tr id="colHeader">
          <th>항목</th>
        </tr>
      </thead>
      <tbody id="totalStatsBody"></tbody>
    </table>
  </div>
</div>

<script>
  window.config = { season: "{{ season }}" };
</script>
<script src="{{ url_for('static', filename='js/statsConfig.js') }}"></script>
<script src="{{ url_for('static', filename='js/totalStats.js') }}"></script>
{% endblock %}
